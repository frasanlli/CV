<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title data-i18n="title">Curriculum Landing Page Multimedia</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="CSS/main.css" type="text/css" rel="stylesheet" media="all">
</head>

<body>

    <header>
        <div class="main_info">
            <h1>Francisco Sancho Llimera</h1>
            <h2 class="sin-borde" data-i18n="developer">Desarrollador web y backend</h2>
        </div>
        <div class="actions">
            <button class="contact" onclick="prepararMail()" data-i18n="contact" >Contactar</button>
            <a class="curv" href="assets/Francisco Sancho Llimera - CV.pdf" data-i18n="downcv" >Descargar CV</a>
            <!--<button class="download" onclick="imprimirPDF()">Descargar CV</button>-->
        </div>
    </header>
    <div class="tab-bar">
        <button class="tab" data-page="proyectos" data-i18n="projects">Proyectos destacados</button>
        <button class="tab" data-page="habilidades" data-i18n="skills">Habilidades</button>
        <button class="tab end-tab" data-page="sobre_mi" data-i18n="aboutme">Sobre mi</button>
        <select id="langSelect" class="tab end-tab language">
            <option value="es">ESP</option>
            <option value="en">ENG</option>
        </select>
    </div>
    <main class="panel">

    </main>
    <footer id="contact">
        <div>
            <img class="svg" src="assets\images\house.svg" alt="github" >
            <span data-i18n="location"></span>
        </div>
        <div>
            <img class="svg" src="assets\images\email.svg" alt="github" >
            <a data-i18n="clickme" onclick="prepararMail() ">¡Pulsa para contactarme!</a>
        </div>
        <div>
            <img class="svg" src="assets\images\github.svg" alt="github" >
            <a href="https://github.com/frasanlli">github.com/frasanlli</a>
        </div>
    </footer>

</body>

<script src="js/i18n.js"></script>
<script src="js/main.js"></script>

</html>
